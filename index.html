<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Network Atlas | Offline Diagram Builder</title>
<style>
:root{--bg:#0a0d12;--panel:#11161e;--panel2:#171d27;--line:#2a3342;--text:#eef3fa;--muted:#8996a8;--accent:#63d8ff;--accent2:#776cff;--danger:#ff6577;--wired:#65d9ff;--wifi:#aa83ff;--zigbee:#f5b942;--success:#5de2a4;--shadow:0 18px 50px #0008}
*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font:13px/1.4 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}button,input,select,textarea{font:inherit}button{color:inherit}.app{height:100%;display:grid;grid-template-columns:272px 1fr;grid-template-rows:58px 1fr 28px}.topbar{grid-column:1/3;display:flex;align-items:center;gap:8px;padding:0 14px;border-bottom:1px solid var(--line);background:#0e131acc;backdrop-filter:blur(16px);z-index:20}.brand{display:flex;align-items:center;gap:10px;width:250px}.logo{width:31px;height:31px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;color:#061019;font-weight:900;box-shadow:0 0 28px #65d9ff33}.brand b{letter-spacing:.02em}.brand small{display:block;color:var(--muted);font-size:10px}.toolbar{display:flex;gap:5px;align-items:center;flex:1}.divider{height:24px;width:1px;background:var(--line);margin:0 4px}.btn{border:1px solid var(--line);background:var(--panel2);border-radius:7px;padding:7px 9px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;min-height:32px}.btn:hover{border-color:#536178;background:#202938}.btn.active{border-color:var(--accent);background:#173444;color:#c8f5ff;box-shadow:inset 0 0 0 1px #63d8ff22}.btn.danger:hover{border-color:var(--danger);color:#ffc3cb}.btn.icon{width:33px;justify-content:center;padding:6px}.btn:disabled{opacity:.35;cursor:not-allowed}.conn-chooser{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}.conn-chooser .btn{border:0;border-radius:0;border-right:1px solid var(--line)}.conn-chooser .btn:last-child{border-right:0}.dot{width:8px;height:8px;border-radius:50%}.sidebar{grid-row:2;padding:13px;background:var(--panel);border-right:1px solid var(--line);overflow:auto;z-index:10}.search{position:relative;margin-bottom:11px}.search input{width:100%;border:1px solid var(--line);background:#0c1118;color:var(--text);border-radius:8px;padding:9px 10px 9px 31px;outline:none}.search input:focus{border-color:var(--accent)}.search span{position:absolute;left:10px;top:9px;color:var(--muted)}.section-title{display:flex;justify-content:space-between;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.13em;margin:16px 2px 8px}.palette{display:grid;grid-template-columns:1fr 1fr;gap:6px}.device{display:flex;align-items:center;gap:8px;padding:8px 7px;border:1px solid transparent;background:#151b24;border-radius:8px;cursor:grab;min-width:0;user-select:none}.device:hover{border-color:#39465b;background:#1b2330;transform:translateY(-1px)}.device:active{cursor:grabbing}.device svg{width:26px;height:26px;flex:0 0 26px}.device span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}.canvas-wrap{position:relative;overflow:hidden;background:#080b10}.canvas-wrap.connecting{cursor:crosshair}.canvas-wrap.panning{cursor:grabbing}#canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.grid-major{stroke:#303a481f;stroke-width:1}.grid-minor{stroke:#303a4810;stroke-width:1}.node{cursor:grab}.node:active{cursor:grabbing}.node .node-card{fill:#151c26;stroke:#354155;stroke-width:1.5;filter:url(#shadow)}.node:hover .node-card{stroke:#687990}.node.selected .node-card{stroke:var(--accent);stroke-width:2.5;filter:url(#glow)}.node .device-icon{color:#9eeaff}.node .node-label{fill:#f3f6fb;font-size:12px;font-weight:650;text-anchor:middle;paint-order:stroke;stroke:#111821;stroke-width:3px;stroke-linejoin:round}.node .node-meta{fill:#8694a6;font-size:9px;text-anchor:middle}.port{fill:#0d131b;stroke:#607088;stroke-width:1;opacity:0}.node:hover .port,.node.selected .port,.connecting .port{opacity:1}.cluster{cursor:move}.cluster rect{fill:#17202a99;stroke:#51627a;stroke-width:1.5;stroke-dasharray:7 5}.cluster.selected rect{stroke:var(--accent);stroke-width:2.5}.cluster .cluster-bar{fill:#222d3b}.cluster text{fill:#c9d5e4;font-size:12px;font-weight:700}.cluster .resize{fill:#7ee4ff;cursor:nwse-resize;opacity:0}.cluster.selected .resize{opacity:1}.edge-hit{stroke:transparent;stroke-width:16;fill:none;cursor:pointer}.edge-line{fill:none;stroke-width:2.4;pointer-events:none}.edge.selected .edge-line{stroke-width:4;filter:url(#glow)}.edge-label{fill:#dfe8f5;font-size:10px;text-anchor:middle;paint-order:stroke;stroke:#0b0f15;stroke-width:4px;stroke-linejoin:round;pointer-events:none}.selection-box{fill:#62d8ff18;stroke:#62d8ff;stroke-dasharray:5 3}.drop-hint{position:absolute;inset:18px;border:2px dashed #64d9ff44;border-radius:18px;display:grid;place-items:center;pointer-events:none;opacity:0;transition:.15s;background:#65d9ff08;color:#b9f1ff;font-size:15px}.drop-hint.show{opacity:1}.empty-state{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);text-align:center;color:var(--muted);pointer-events:none}.empty-state .orb{margin:auto;width:86px;height:86px;border:1px solid #425168;border-radius:24px;display:grid;place-items:center;font-size:36px;background:radial-gradient(circle at 30% 20%,#244358,#111721);box-shadow:0 25px 80px #000}.empty-state h2{color:#dfe8f5;font-size:17px;margin:18px 0 4px}.empty-state p{margin:0;max-width:300px}.minimap{position:absolute;right:14px;bottom:14px;width:174px;height:112px;border:1px solid #384457;border-radius:9px;background:#0c1118dd;box-shadow:var(--shadow);overflow:hidden}.minimap svg{width:100%;height:100%}.zoom-controls{position:absolute;right:14px;top:14px;display:flex;flex-direction:column;gap:5px}.statusbar{grid-column:1/3;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#0c1117;border-top:1px solid var(--line);color:var(--muted);font-size:10px;z-index:20}.statusbar .left,.statusbar .right{display:flex;gap:16px}.kbd{border:1px solid #394354;border-bottom-width:2px;border-radius:4px;padding:1px 4px;background:#171d26;color:#aeb9c8}.modal-backdrop{position:fixed;inset:0;background:#0009;display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px)}.modal-backdrop.open{display:flex}.modal{width:min(470px,calc(100vw - 32px));background:#121821;border:1px solid #344156;border-radius:14px;box-shadow:var(--shadow);overflow:hidden}.modal-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.modal-head h3{margin:0;font-size:15px}.modal-body{padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:13px}.field.full{grid-column:1/3}.field label{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:7px;background:#0b1017;color:var(--text);padding:9px;outline:none}.field textarea{height:76px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}.modal-actions{display:flex;justify-content:flex-end;gap:8px;padding:13px 18px;border-top:1px solid var(--line)}.context{position:fixed;display:none;z-index:80;background:#151b24;border:1px solid #384456;border-radius:9px;box-shadow:var(--shadow);padding:5px;min-width:180px}.context.open{display:block}.context button{display:flex;width:100%;border:0;background:transparent;color:var(--text);padding:8px 9px;border-radius:5px;text-align:left;cursor:pointer;justify-content:space-between}.context button:hover{background:#253043}.context hr{border:0;border-top:1px solid var(--line);margin:4px}.toast{position:fixed;left:50%;bottom:46px;transform:translate(-50%,20px);padding:9px 13px;background:#e7f8ff;color:#0a1720;border-radius:8px;font-weight:700;opacity:0;pointer-events:none;transition:.22s;z-index:200;box-shadow:var(--shadow)}.toast.show{opacity:1;transform:translate(-50%,0)}.hidden{display:none!important}@media(max-width:780px){.app{grid-template-columns:210px 1fr}.brand{width:190px}.btn .txt{display:none}.minimap{display:none}.palette{grid-template-columns:1fr}.topbar{padding:0 7px}.toolbar{overflow-x:auto}.statusbar .right{display:none}}
/* Keep canvas gestures inside the diagram instead of invoking native text selection. */
.canvas-wrap,#canvas,#canvas text{user-select:none;-webkit-user-select:none}
.selection-box{pointer-events:none}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><div class="logo">N</div><div><b>Network Atlas</b><small>Offline diagram builder</small></div></div>
    <div class="toolbar">
      <button class="btn icon" id="undoBtn" title="Undo (Ctrl/Cmd+Z)" aria-label="Undo">↶</button><button class="btn icon" id="redoBtn" title="Redo (Ctrl/Cmd+Shift+Z)" aria-label="Redo">↷</button><div class="divider"></div>
      <button class="btn active" id="selectTool" data-tool="select">↖ <span class="txt">Select</span></button><button class="btn" id="panTool" data-tool="pan">✥ <span class="txt">Pan</span></button><button class="btn" id="clusterTool">▣ <span class="txt">Cluster</span></button><div class="divider"></div>
      <div class="conn-chooser" title="Choose a connection type, then click two devices"><button class="btn" data-connect="wired"><i class="dot" style="background:var(--wired)"></i><span class="txt">Wired</span></button><button class="btn" data-connect="wifi"><i class="dot" style="background:var(--wifi)"></i><span class="txt">Wi‑Fi</span></button><button class="btn" data-connect="zigbee"><i class="dot" style="background:var(--zigbee)"></i><span class="txt">Zigbee</span></button></div>
      <div style="flex:1"></div><button class="btn" id="svgBtn" title="Export a presentation-ready SVG">▧ <span class="txt">SVG</span></button><button class="btn" id="exportBtn" title="Export editable project JSON">⇩ <span class="txt">Project</span></button><button class="btn" id="addBtn" title="Merge another diagram into this project">＋ <span class="txt">Add Diagram</span></button><button class="btn" id="openBtn" title="Replace this project with another diagram">↥ <span class="txt">Open Diagram</span></button><button class="btn danger icon" id="clearBtn" title="Clear diagram">⌫</button><input id="fileInput" type="file" accept="application/json,.json" data-mode="open" hidden>
    </div>
  </header>
  <aside class="sidebar">
    <div class="search"><span>⌕</span><input id="deviceSearch" placeholder="Search 30+ devices…" aria-label="Search devices"></div>
    <div id="palette"></div>
    <div class="section-title"><span>Quick start</span></div>
    <button class="btn" id="sampleBtn" style="width:100%;justify-content:center">Load workshop example</button>
    <div style="height:14px"></div>
  </aside>
  <main class="canvas-wrap" id="canvasWrap">
    <svg id="canvas" tabindex="0" role="application" aria-label="Network diagram canvas">
      <defs>
        <pattern id="minorGrid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0H0V20" class="grid-minor" fill="none"/></pattern>
        <pattern id="majorGrid" width="100" height="100" patternUnits="userSpaceOnUse"><rect width="100" height="100" fill="url(#minorGrid)"/><path d="M100 0H0V100" class="grid-major" fill="none"/></pattern>
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="5" stdDeviation="5" flood-opacity=".45"/></filter>
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#65d9ff" flood-opacity=".7"/></filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#92a1b4"/></marker>
      </defs>
      <g id="viewport"><rect id="grid" x="-5000" y="-5000" width="10000" height="10000" fill="url(#majorGrid)"/><g id="clustersLayer"></g><g id="edgesLayer"></g><g id="nodesLayer"></g><g id="overlayLayer"></g></g>
    </svg>
    <div class="drop-hint" id="dropHint">Drop to place device</div>
    <div class="empty-state" id="emptyState"><div class="orb">⌘</div><h2>Build your network map</h2><p>Drag a device from the library, or load the example topology.</p></div>
    <div class="zoom-controls"><button class="btn icon" id="zoomIn" title="Zoom in">＋</button><button class="btn icon" id="zoomOut" title="Zoom out">−</button><button class="btn icon" id="zoomFit" title="Fit diagram">⊡</button></div>
    <div class="minimap"><svg id="minimap" aria-label="Diagram overview"></svg></div>
  </main>
  <footer class="statusbar"><div class="left"><span id="statusText">Ready</span><span id="counts">0 devices · 0 links</span></div><div class="right"><span><span class="kbd">Del</span> remove</span><span><span class="kbd">⌘Z</span> undo</span><span><span class="kbd">Space</span> pan</span><span>Double-click to edit</span><span id="zoomText">100%</span></div></footer>
</div>

<div class="modal-backdrop" id="modalBackdrop">
 <form class="modal" id="propertyForm"><div class="modal-head"><h3 id="modalTitle">Properties</h3><button type="button" class="btn icon" id="modalClose">×</button></div><div class="modal-body" id="modalFields"></div><div class="modal-actions"><button type="button" class="btn" id="modalCancel">Cancel</button><button class="btn active" type="submit">Save changes</button></div></form>
</div>
<div class="context" id="contextMenu"><button data-action="edit">Edit properties <span>↵</span></button><button data-action="duplicate">Duplicate <span>⌘D</span></button><button data-action="front">Bring to front</button><hr><button data-action="delete" style="color:#ff8493">Delete <span>Del</span></button></div>
<div class="toast" id="toast"></div>

<script>
(()=>{'use strict';
const TYPES=[
 ['Network',['router','Router','route'],['modem','Modem / ONT','modem'],['firewall','Firewall','shield'],['switch','Network switch','switch'],['access-point','Access point','wifi'],['gateway','IoT gateway','gateway'],['load-balancer','Load balancer','balance'],['vpn','VPN gateway','lock']],
 ['Compute',['server','Server','server'],['nas','NAS / storage','storage'],['desktop','Desktop','desktop'],['laptop','Laptop','laptop'],['mini-pc','Mini PC','chip'],['raspberry-pi','Raspberry Pi','pi'],['raspberry-pi-zero','Pi Zero','pi'],['raspberry-pi-pico','Pi Pico','chip'],['virtual-machine','Virtual machine','cube'],['cloud','Cloud service','cloud']],
 ['Smart home & IoT',['camera','IP camera','camera'],['doorbell','Video doorbell','bell'],['light','Smart light','bulb'],['sensor','Sensor','sensor'],['thermostat','Thermostat','thermo'],['smart-plug','Smart plug','plug'],['speaker','Smart speaker','speaker'],['hub','Smart home hub','hub']],
 ['Endpoints & power',['phone','Phone','phone'],['tablet','Tablet','tablet'],['printer','Printer','printer'],['tv','Smart TV','tv'],['ups','UPS','battery'],['pdu','PDU','power'],['internet','Internet','globe'],['unknown','Other device','other']]
];
const typeMap={};TYPES.forEach(([cat,...items])=>items.forEach(([id,label,icon])=>typeMap[id]={id,label,icon,cat}));
const COLORS={wired:'#65d9ff',wifi:'#aa83ff',zigbee:'#f5b942'};
const $=s=>document.querySelector(s), svg=(tag,attrs={})=>{const e=document.createElementNS('http://www.w3.org/2000/svg',tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid=p=>p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
let state={nodes:[],edges:[],clusters:[],view:{x:0,y:0,scale:1},settings:{snap:true}};
let history=[],future=[],selected=new Set(),tool='select',connectType=null,connectFrom=null,drag=null,clipboard=[],modalTarget=null,saveTimer=null,spaceTool=null;

function iconMarkup(kind,color='#9eeaff'){
 const common=`fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"`;
 const paths={route:'<circle cx="8" cy="8" r="2"/><circle cx="24" cy="8" r="2"/><circle cx="8" cy="24" r="2"/><circle cx="24" cy="24" r="2"/><path d="M10 8h12M8 10v12M24 10v12M10 24h12"/>',modem:'<rect x="4" y="10" width="24" height="14" rx="3"/><path d="M9 18h1m4 0h1m4 0h5M12 10l4-5 4 5"/>',shield:'<path d="M16 3l11 4v7c0 7-4.5 12-11 15C9.5 26 5 21 5 14V7z"/><path d="M10 12h12M10 17h12M10 22h12"/>',switch:'<rect x="3" y="8" width="26" height="17" rx="3"/><path d="M8 14h3m3 0h3m3 0h4M8 19h3m3 0h3m3 0h4"/>',wifi:'<path d="M4 12a18 18 0 0124 0M8 17a12 12 0 0116 0M12 22a6 6 0 018 0"/><circle cx="16" cy="27" r="1" fill="'+color+'"/>',gateway:'<path d="M5 25V7h22v18M2 25h28"/><path d="M10 14h12m-6-5v12M12 18l4 4 4-4"/>',balance:'<path d="M16 5v22M7 10h18M7 10L3 20h8zM25 10l-4 10h8z"/>',lock:'<rect x="6" y="14" width="20" height="14" rx="3"/><path d="M10 14V9a6 6 0 0112 0v5M16 20v3"/>',server:'<rect x="5" y="3" width="22" height="8" rx="2"/><rect x="5" y="12" width="22" height="8" rx="2"/><rect x="5" y="21" width="22" height="8" rx="2"/><path d="M9 7h1m-1 9h1m-1 9h1m4-18h9m-9 9h9m-9 9h9"/>',storage:'<ellipse cx="16" cy="7" rx="11" ry="4"/><path d="M5 7v9c0 2 5 4 11 4s11-2 11-4V7M5 16v9c0 2 5 4 11 4s11-2 11-4v-9"/>',desktop:'<rect x="3" y="4" width="26" height="18" rx="2"/><path d="M12 28h8m-4-6v6"/>',laptop:'<rect x="7" y="4" width="18" height="17" rx="2"/><path d="M3 25h26l-2 3H5z"/>',chip:'<rect x="8" y="8" width="16" height="16" rx="2"/><path d="M12 3v5m8-5v5m-8 16v5m8-5v5M3 12h5m-5 8h5m16-8h5m-5 8h5"/><circle cx="16" cy="16" r="3"/>',pi:'<path d="M16 10c-6-7-12 1-7 5-6 3-2 11 3 9 0 6 8 7 10 2 6 1 8-7 3-10 4-5-4-11-9-6z"/><path d="M13 8c-1-3 2-5 5-4m1 4c1-3 4-3 6-1"/>',cube:'<path d="M16 3l12 7v13l-12 7-12-7V10zM4 10l12 7 12-7M16 17v13"/>',cloud:'<path d="M9 25h16a6 6 0 000-12h-1A9 9 0 007 12a7 7 0 002 13z"/>',camera:'<path d="M5 10h17v14H5zM22 14l7-4v14l-7-4M9 10l2-4h6l2 4"/><circle cx="13.5" cy="17" r="3"/>',bell:'<rect x="8" y="3" width="16" height="26" rx="6"/><circle cx="16" cy="12" r="4"/><path d="M13 23h6"/>',bulb:'<path d="M10 20c-3-2-5-5-5-9a11 11 0 0122 0c0 4-2 7-5 9l-2 3h-8zM12 27h8M13 30h6"/>',sensor:'<circle cx="16" cy="16" r="3"/><path d="M10 10a8 8 0 000 12m12 0a8 8 0 000-12M6 6a14 14 0 000 20m20 0a14 14 0 000-20"/>',thermo:'<path d="M13 18V7a3 3 0 016 0v11a7 7 0 11-6 0z"/><path d="M16 11v11"/>',plug:'<path d="M11 4v8m10-8v8M8 12h16v4a8 8 0 01-8 8 8 8 0 01-8-8zM16 24v5"/>',speaker:'<rect x="8" y="3" width="16" height="26" rx="6"/><circle cx="16" cy="11" r="3"/><circle cx="16" cy="21" r="5"/>',hub:'<circle cx="16" cy="16" r="6"/><circle cx="5" cy="8" r="2"/><circle cx="27" cy="8" r="2"/><circle cx="5" cy="25" r="2"/><circle cx="27" cy="25" r="2"/><path d="M10 13L7 9m15 4l3-4M10 20l-3 4m15-4l3 4"/>',phone:'<rect x="9" y="2" width="14" height="28" rx="3"/><path d="M14 6h4m-3 20h2"/>',tablet:'<rect x="5" y="2" width="22" height="28" rx="3"/><circle cx="16" cy="26" r="1"/>',printer:'<path d="M8 11V3h16v8M8 24H4V11h24v13h-4M8 19h16v10H8z"/><path d="M23 15h1"/>',tv:'<rect x="3" y="5" width="26" height="19" rx="2"/><path d="M11 29h10M16 24v5"/>',battery:'<rect x="5" y="7" width="22" height="20" rx="3"/><path d="M12 3h8v4m-5 4l-4 8h5l-1 5 6-9h-5l2-4z"/>',power:'<rect x="5" y="4" width="22" height="24" rx="3"/><circle cx="11" cy="11" r="2"/><circle cx="21" cy="11" r="2"/><circle cx="11" cy="21" r="2"/><circle cx="21" cy="21" r="2"/>',globe:'<circle cx="16" cy="16" r="13"/><path d="M3 16h26M16 3c5 5 5 21 0 26M16 3c-5 5-5 21 0 26"/>',other:'<circle cx="16" cy="16" r="13"/><path d="M12 12a4 4 0 118 0c0 4-4 4-4 8m0 5v1"/>',thermo:'<path d="M13 19V7a3 3 0 016 0v12a7 7 0 11-6 0zM16 12v11"/>',plug:'<path d="M11 4v8m10-8v8M8 12h16v4a8 8 0 01-16 0zM16 24v6"/>'};
 return `<svg viewBox="0 0 32 32" aria-hidden="true"><g ${common}>${paths[kind]||paths.other}</g></svg>`;
}
function buildPalette(filter=''){$('#palette').innerHTML='';const q=filter.toLowerCase();TYPES.forEach(([cat,...items])=>{const found=items.filter(x=>x[1].toLowerCase().includes(q)||x[0].includes(q));if(!found.length)return;const title=document.createElement('div');title.className='section-title';title.innerHTML=`<span>${cat}</span><span>${found.length}</span>`;$('#palette').appendChild(title);const box=document.createElement('div');box.className='palette';found.forEach(([id,label,kind])=>{const d=document.createElement('div');d.className='device';d.draggable=true;d.dataset.type=id;d.title=`Drag ${label} onto the canvas`;d.innerHTML=iconMarkup(kind)+`<span>${esc(label)}</span>`;box.appendChild(d)});$('#palette').appendChild(box)})}

function snapshot(){return JSON.stringify({nodes:state.nodes,edges:state.edges,clusters:state.clusters})}
function commit(before){const now=snapshot();if(before!==now){history.push(before);if(history.length>80)history.shift();future=[];scheduleSave()}updateButtons();render()}
function restore(raw){const d=JSON.parse(raw);state.nodes=d.nodes||[];state.edges=d.edges||[];state.clusters=d.clusters||[];selected.clear();render();scheduleSave();updateButtons()}
function undo(){if(!history.length)return;future.push(snapshot());restore(history.pop());toast('Undone')}
function redo(){if(!future.length)return;history.push(snapshot());restore(future.pop());toast('Redone')}

function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{localStorage.setItem('network-atlas-diagram',JSON.stringify(state));setStatus('Saved locally')},250)}
function loadSaved(){try{const s=JSON.parse(localStorage.getItem('network-atlas-diagram'));if(s&&Array.isArray(s.nodes))state={...state,...s}}catch(e){console.warn(e)}}

function clientToWorld(cx,cy){const r=$('#canvas').getBoundingClientRect();return{x:(cx-r.left-state.view.x)/state.view.scale,y:(cy-r.top-state.view.y)/state.view.scale}}

function applyZoom(factor,cx,cy){const r=$('#canvas').getBoundingClientRect(),old=state.view.scale,n=Math.max(.2,Math.min(3,old*factor));const px=cx??r.width/2,py=cy??r.height/2;state.view.x=px-(px-state.view.x)*n/old;state.view.y=py-(py-state.view.y)*n/old;state.view.scale=n;setView();scheduleSave()}

function snap(v){return state.settings.snap?Math.round(v/10)*10:v}

function edgePath(a,b,index=0){const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy)||1,ox=-dy/len*(index*8),oy=dx/len*(index*8);return `M${a.x+ox} ${a.y+oy} L${b.x+ox} ${b.y+oy}`}

 state.nodes.forEach(n=>{const t=typeMap[n.type]||typeMap.unknown,g=svg('g',{class:'node'+(selected.has(n.id)?' selected':''),'data-id':n.id,transform:`translate(${n.x} ${n.y})`});g.innerHTML=`<rect class="node-card" x="-38" y="-32" width="76" height="64" rx="13"/><g class="device-icon" transform="translate(-16 -22)">${iconMarkup(t.icon,n.color||'#9eeaff').replace(/^<svg[^>]*>|<\/svg>$/g,'')}</g><text class="node-label" x="0" y="46">${esc(n.name)}</text>${n.ip?`<text class="node-meta" x="0" y="58">${esc(n.ip)}</text>`:''}<circle class="port" cx="0" cy="-32" r="4"/><circle class="port" cx="38" cy="0" r="4"/><circle class="port" cx="0" cy="32" r="4"/><circle class="port" cx="-38" cy="0" r="4"/>`;nl.appendChild(g)});

function exportSVG(){const items=[...state.nodes.map(n=>({x:n.x-52,y:n.y-43,w:104,h:112})),...state.clusters];if(!items.length){toast('Add something before exporting');return}const minX=Math.min(...items.map(a=>a.x))-30,minY=Math.min(...items.map(a=>a.y))-30,maxX=Math.max(...items.map(a=>a.x+a.w))+30,maxY=Math.max(...items.map(a=>a.y+a.h))+30,clone=$('#canvas').cloneNode(true);clone.setAttribute('xmlns','http://www.w3.org/2000/svg');clone.setAttribute('viewBox',`${minX} ${minY} ${maxX-minX} ${maxY-minY}`);clone.setAttribute('width',maxX-minX);clone.setAttribute('height',maxY-minY);clone.querySelector('#viewport').removeAttribute('transform');clone.querySelector('#grid')?.remove();clone.querySelector('#overlayLayer')?.remove();const style=document.createElementNS('http://www.w3.org/2000/svg','style');style.textContent=`.node-card{fill:#151c26;stroke:#354155;stroke-width:1.5}.node-label{fill:#f3f6fb;font:650 12px system-ui;text-anchor:middle;paint-order:stroke;stroke:#111821;stroke-width:3px}.node-meta{fill:#8694a6;font:9px system-ui;text-anchor:middle}.cluster rect{fill:#17202a;stroke:#51627a;stroke-width:1.5;stroke-dasharray:7 5}.cluster .cluster-bar{fill:#222d3b}.cluster text{fill:#c9d5e4;font:700 12px system-ui}.edge-line{fill:none;stroke-width:2.4}.edge-hit,.port,.resize{display:none}.edge-label{fill:#dfe8f5;font:10px system-ui;text-anchor:middle;paint-order:stroke;stroke:#0b0f15;stroke-width:4px}`;clone.prepend(style);const source='<?xml version="1.0" encoding="UTF-8"?>\n'+new XMLSerializer().serializeToString(clone),blob=new Blob([source],{type:'image/svg+xml'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='network-diagram.svg';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast('SVG image exported')}
function importJSON(file,mode='open'){const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!Array.isArray(d.nodes)||!Array.isArray(d.edges))throw Error('Invalid project');if(mode==='add'){const label=d.meta?.project||file.name.replace(/\.json$/i,'')||'diagram';if(!confirm(`Add “${label}” to the current project?\n\nThis will merge ${d.nodes.length} devices, ${d.edges.length} connections, and ${(d.clusters||[]).length} clusters. Existing items will not be replaced.`))return;mergeDiagram(d,label)}else{const before=snapshot();state={...state,...d,view:d.view||state.view};selected.clear();commit(before);fitView();toast('Diagram opened')}}catch{toast('Could not read that diagram')}};r.readAsText(file)}
function mergeDiagram(d,label){const before=snapshot(),incomingNodes=d.nodes||[],incomingClusters=d.clusters||[],incomingEdges=d.edges||[],allCurrent=[...state.nodes.map(n=>({x:n.x-45,y:n.y-35,w:90,h:70})),...state.clusters],allIncoming=[...incomingNodes.map(n=>({x:n.x-45,y:n.y-35,w:90,h:70})),...incomingClusters],currentMaxX=allCurrent.length?Math.max(...allCurrent.map(a=>a.x+a.w)):0,currentMinY=allCurrent.length?Math.min(...allCurrent.map(a=>a.y)):0,incomingMinX=allIncoming.length?Math.min(...allIncoming.map(a=>a.x)):0,incomingMinY=allIncoming.length?Math.min(...allIncoming.map(a=>a.y)):0,dx=allCurrent.length?currentMaxX-incomingMinX+180:0,dy=allCurrent.length?currentMinY-incomingMinY:0,prefix=uid('merge'),nodeIds={},clusterIds={};const nodes=incomingNodes.map(n=>{const id=`${prefix}_${n.id}`;nodeIds[n.id]=id;return{...n,id,x:(Number(n.x)||0)+dx,y:(Number(n.y)||0)+dy}}),clusters=incomingClusters.map(c=>{const id=`${prefix}_${c.id}`;clusterIds[c.id]=id;return{...c,id,x:(Number(c.x)||0)+dx,y:(Number(c.y)||0)+dy,name:c.name||label}}),edges=incomingEdges.filter(e=>nodeIds[e.from]&&nodeIds[e.to]).map(e=>({...e,id:`${prefix}_${e.id}`,from:nodeIds[e.from],to:nodeIds[e.to]}));state.nodes.push(...nodes);state.clusters.push(...clusters);state.edges.push(...edges);selected=new Set(nodes.map(n=>n.id));commit(before);fitView();toast(`${label} added to project`)}
function loadSample(){if(state.nodes.length&&!confirm('Replace the current diagram with the example?'))return;const before=snapshot(),N=(id,type,name,x,y,ip='')=>({id,type,name,x,y,ip,notes:'Fictional sample data',color:'#9eeaff'});state.nodes=[N('internet','internet','Internet',70,250),N('modem','modem','Cable Modem',210,250),N('fw','firewall','Workshop Firewall',370,250,'10.42.0.1'),N('sw','switch','Managed PoE Switch',540,250,'10.42.0.2'),N('ap','access-point','Front Office AP',540,80,'10.42.0.3'),N('workstation','desktop','Bench Workstation',720,150,'10.42.0.50'),N('printer','printer','Label Printer',720,270,'10.42.0.60'),N('camera','camera','Loading Bay Camera',900,150,'10.42.0.70'),N('gateway','gateway','Sensor Gateway',900,300,'10.42.0.10'),N('sensor','sensor','Stockroom Sensor',1060,300),N('laptop','laptop','Service Laptop',720,20,'10.42.0.90')];state.edges=[['internet','modem','wired','Provider link'],['modem','fw','wired','WAN'],['fw','sw','wired','LAN trunk'],['sw','ap','wired','PoE'],['sw','workstation','wired','1 GbE'],['sw','printer','wired','1 GbE'],['sw','camera','wired','PoE'],['sw','gateway','wired','1 GbE'],['ap','laptop','wifi','Workshop Wi-Fi'],['gateway','sensor','zigbee','Zigbee mesh']].map(([from,to,type,name])=>({id:uid('edge'),from,to,type,name,bandwidth:'',notes:'Fictional sample data',directed:false}));state.clusters=[{id:'workshop',x:310,y:-30,w:800,h:410,name:'Demo Repair Workshop | 10.42.0.0/24',notes:'Fictional sample network',color:'#51627a'}];selected.clear();commit(before);setTimeout(fitView,30)}
function createClusterMode(){setTool('select');const r=$('#canvas').getBoundingClientRect(),p=clientToWorld(r.left+r.width/2-150,r.top+r.height/2-95);const c=addCluster(p.x,p.y);openProperties(c.id)}

$('#deviceSearch').addEventListener('input',e=>buildPalette(e.target.value));$('#undoBtn').onclick=undo;$('#redoBtn').onclick=redo;$('#selectTool').onclick=()=>setTool('select');$('#panTool').onclick=()=>setTool('pan');$('#clusterTool').onclick=createClusterMode;document.querySelectorAll('[data-connect]').forEach(b=>b.onclick=()=>setConnect(b.dataset.connect));$('#zoomIn').onclick=()=>applyZoom(1.2);$('#zoomOut').onclick=()=>applyZoom(.8);$('#zoomFit').onclick=fitView;$('#svgBtn').onclick=exportSVG;$('#exportBtn').onclick=exportJSON;$('#openBtn').onclick=()=>{if((state.nodes.length||state.clusters.length)&&!confirm('Open another diagram?\n\nThis will replace the entire current project. You can use Undo afterward to restore it.'))return;$('#fileInput').dataset.mode='open';$('#fileInput').click()};$('#addBtn').onclick=()=>{$('#fileInput').dataset.mode='add';$('#fileInput').click()};$('#fileInput').onchange=e=>{if(e.target.files[0])importJSON(e.target.files[0],e.target.dataset.mode);e.target.value=''};$('#clearBtn').onclick=()=>{if(!state.nodes.length&&!state.clusters.length)return;if(confirm('Clear the entire diagram?')){const before=snapshot();state.nodes=[];state.edges=[];state.clusters=[];selected.clear();commit(before)}};$('#sampleBtn').onclick=loadSample;$('#modalClose').onclick=$('#modalCancel').onclick=closeModal;$('#modalBackdrop').onclick=e=>{if(e.target===e.currentTarget)closeModal()};$('#propertyForm').onsubmit=e=>{e.preventDefault();saveProperties(e.currentTarget)};$('#contextMenu').onclick=e=>{const a=e.target.closest('[data-action]')?.dataset.action;if(!a)return;$('#contextMenu').classList.remove('open');if(a==='edit'&&selected.size===1)openProperties([...selected][0]);if(a==='duplicate')duplicateSelected();if(a==='delete')deleteSelected();if(a==='front'){const before=snapshot();const ids=new Set(selected);state.nodes=[...state.nodes.filter(x=>!ids.has(x.id)),...state.nodes.filter(x=>ids.has(x.id))];commit(before)}};document.addEventListener('click',e=>{if(!e.target.closest('#contextMenu'))$('#contextMenu').classList.remove('open')});window.addEventListener('resize',setView);

$('#canvas').addEventListener('pointerdown',e=>e.preventDefault(),{capture:true});
// The marquee is transient: discard the previous frame before drawing the next one.
$('#canvas').addEventListener('pointermove',()=>{$('#overlayLayer').innerHTML=''},{capture:true});
$('#canvas').addEventListener('pointerup',()=>{$('#overlayLayer').innerHTML=''},{capture:true});
$('#canvas').addEventListener('pointercancel',()=>{$('#overlayLayer').innerHTML='';drag=null},{capture:true});
buildPalette();loadSaved();updateButtons();render();if(state.nodes.length)setTimeout(fitView,20);
})();
